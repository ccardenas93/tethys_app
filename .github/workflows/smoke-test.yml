name: Smoke Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: tethys-contest
          cache-environment: true

      - name: Run tests
        shell: bash -el {0}
        run: python -m pytest tests

      - name: Run pipeline self-test
        shell: bash -el {0}
        run: python -m tethysapp.andean_hydromet.services.forecast_pipeline --self-test
